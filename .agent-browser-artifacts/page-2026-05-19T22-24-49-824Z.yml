          - heading "Jokes for Kids about the Weather" [level=2] [ref=e204]
          - list [ref=e205]:
            - listitem [ref=e206]: What does a cloud wear under his raincoat? Thunderwear.
            - listitem [ref=e207]: What do you call a snowman that works out? The abdominal snowman.
            - listitem [ref=e208]: What type of lightning likes to play sports? Ball lightning.
            - listitem [ref=e209]: What goes up when the rain comes down? Umbrellas.
            - listitem [ref=e210]: What happens when it rains cats and dogs? You have to be careful not to step in a poodle.
            - listitem [ref=e211]: Why did the sun go to summer school? To get a little brighter.
            - listitem [ref=e212]: Why does the hurricane have bad vision? It only has one eye.
            - listitem [ref=e213]: What kind of bow can't be tied? A rainbow.
            - listitem [ref=e214]: What kind of bear gets caught in a rainstorm? A drizzly bear.
            - listitem [ref=e215]: What happens when a lightning bolt hears a joke? It cracks up.
            - listitem [ref=e216]: Why is it cold on Christmas? Because it’s in Decembrrrrr!
            - listitem [ref=e217]: Why do chickens play in the rain? They love fowl weather.
            - listitem [ref=e218]: How do mountains stay warm in the winter? They wear snow caps.
            - listitem [ref=e219]: If an orchestra plays in a thunderstorm, who is most likely to get hit by lightning? The conductor.
            - listitem [ref=e220]: Why didn't the sun go to college? It has a million degrees.
            - listitem [ref=e221]: What do you call a snowman on a hot day? A puddle.
            - listitem [ref=e222]: What happens when winter arrives? Autumn leaves.
            - listitem [ref=e223]: Why did the tree take up a hobby? It wanted to branch out.
            - listitem [ref=e224]: Why do trees get emotional in spring? They always feel a little sappy.
            - listitem [ref=e225]: What do you get if you cross a shark with ice? Frostbite.
            - listitem [ref=e226]: Why does Dad always wear gloves in the winter? Because the weather is snow joke.
            - listitem [ref=e227]: Why is the flower always tardy? It's a late bloomer.
            - listitem [ref=e228]: What happened to the snowman during the heat wave? He made a pool of himself.
            - listitem [ref=e229]: What is the math student's favorite season? Sum-mer.
            - listitem [ref=e230]: What did the raindrop say to his friends? Two's company, but three's a cloud.
            - listitem [ref=e231]: How does a thunderstorm catch fish? With a lightning rod.
            - listitem [ref=e232]: What's hotter than a summer Saturday? A Sun-day.
            - listitem [ref=e233]: What drops but never hits the ground? The temperature.
            - listitem [ref=e234]: Where does a snowman keep its money? In a snowbank.
            - listitem [ref=e235]: Why do birds fly south every winter? It's too far to walk.
            - listitem [ref=e236]: What did the snowman name his baby? Jack Frost.
          - generic [ref=e239]: Advertisement - Continue Reading Below
